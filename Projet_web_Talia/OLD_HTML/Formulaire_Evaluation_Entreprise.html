  <body>
    <form action="confirmation.html" method="POST" class="form-evaluation">
      <div class="Flexbox2">
        <h2>Votre avis nous intéresse</h2>
        <div class="Flexbox3">
          <div class="rating">
            <input type="radio" name="star" id="star5" value="5" /><label
              for="star5"
            ></label>
            <input type="radio" name="star" id="star4" value="4" /><label
              for="star4"
            ></label>
            <input type="radio" name="star" id="star3" value="3" /><label
              for="star3"
            ></label>
            <input type="radio" name="star" id="star2" value="2" /><label
              for="star2"
            ></label>
            <input type="radio" name="star" id="star1" value="1" /><label
              for="star1"
            ></label>
          </div>
        </div>

        <br />
        <div class="Flexbox4">
          <textarea
            name="commentaire"
            placeholder="Écrivez votre avis ici..."
            rows="5"
          ></textarea>
        </div>
        <br /><br />
        <div class="Flexbox5">
          <input type="submit" value="Publier mon avis" />
        </div>
      </div>
    </form>
  </body>
