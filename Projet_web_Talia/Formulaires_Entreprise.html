<!doctype html>

<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link href="Formulaire_Entreprise.css" rel="stylesheet" />
    <title>AdJob</title>
    <div class="flexbox">
      <center>
        <nav>
          <ul>
            <a href="Acceuil.html"
              >Accueil<img src="Images/Image_Maison.png" width="30" height="30"
            /></a>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <a href="page2.html"
              >A propos<img
                src="Images/Image_Profil.png"
                width="30"
                height="30"
            /></a>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <a href="page3.html"
              >Candidature<img
                src="Images/Image_Candidature.png"
                width="30"
                height="30" /></a
            >&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <a href="page4.html"
              >Parametre<img
                src="Images/Image_Paramètre.png"
                width="30"
                height="30" /></a
            >&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <a href="page5.html"
              >Avis<img src="Images/Image_Avis.png" width="30" height="30"
            /></a>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
            <a href="page6.html"
              >Contact<img src="Images/Image_Profil.png" width="30" height="30"
            /></a>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
          </ul>
        </nav>
      </center>
    </div>
  </head>
  <body>
    <div class="Flexbox1">
      <center><h1>Formulaire d'inscription entreprise</h1></center>
    </div>
    <div class="Flexbox2">
      <h2>Nom de l'entreprise</h2>
      <input
        type="text"
        id="name"
        placeholder="Entrez le nom de votre entreprise"
      />
    </div>
    <div class="Flexbox3">
      <h2>Secteur d'activité</h2>
      <input
        type="text"
        id="secteur"
        placeholder="Entrez le secteur de votre entreprise"
      />
    </div>
    <div class="Flexbox4">
      <h2>Logo</h2>
      <input type="file" id="logo" accept="image/*" />
    </div>
    <div class="Flexbox5">
      <h2>Description Courte</h2>
      <textarea
        id="Description"
        placeholder="Décrivez votre entreprise en 1500 caractères maximum"
        maxlength="1500"
      ></textarea>
    </div>
    <div class="Flexbox6">
      <h2>Coordonnées</h2>
      <div class="Flexbox7">
        <h2>Adresse Postal</h2>
        <input
          type="text"
          id="name"
          placeholder="Entrez l'adresse Postal de votre Entreprise"
        />
      </div>
      <div class="Flexbox8">
        <h2>Téléphone</h2>
        <input type="number" min="0" placeholder="Numéro de Téléphone " />
      </div>
      <div class="Flexbox9">
        <h2>Email</h2>
        <input
          type="text"
          id="name"
          placeholder="Entrez l'adresse email de votre entreprise"
        />
      </div>
      <div class="Flexbox10">
        <h2>Site Internet</h2>
        <input
          type="text"
          id="name"
          placeholder="Entrez l'URL de votre site Internet"
        />
      </div>
    </div>
  </body>

  <footer></footer>
</html>
